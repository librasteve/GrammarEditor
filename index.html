<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raku Grammar Editor</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            background: #1e1e2e;
            color: #cdd6f4;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #45475a;
        }

        #panel-area {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 2px;
        }

        #left-half {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        #right-half {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        #right-half.hidden {
            display: none;
        }

        #right-top-row {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: row;
            gap: 2px;
            overflow: hidden;
        }

        #right-top-row>.panel {
            flex: 0 0 50%;
        }

        #right-top-row.single>.panel:not(.collapsed) {
            flex: 1;
        }

        #made-panel {
            flex: 0 0 25%;
        }

        #made-panel.collapsed {
            display: none;
        }

        .panel.collapsed {
            display: none;
        }

        .panel {
            background: #1e1e2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .panel-header {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            background: #181825;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c7086;
            user-select: none;
            flex-shrink: 0;
            gap: 8px;
        }

        .panel-header-btns {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }

        .panel-header-btn {
            background: none;
            border: none;
            color: #6c7086;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 14px;
            border-radius: 3px;
            line-height: 1;
        }

        .panel-header-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #cdd6f4;
        }

        .panel-body {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #trace-body,
        #match-body,
        #made-body {
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .editor-container {
            position: relative;
            height: 100%;
        }

        .editor-container textarea,
        .editor-container pre {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 10px;
            margin: 0;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            line-height: 1.5;
            tab-size: 4;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            background: transparent;
        }

        .editor-container textarea {
            z-index: 2;
            color: transparent;
            caret-color: #cdd6f4;
            resize: none;
            background: transparent;
        }

        .editor-container pre {
            z-index: 1;
            color: #cdd6f4;
            pointer-events: none;
        }

        .editor-container pre code {
            font-family: inherit;
            font-size: inherit;
            line-height: 1.5;
        }

        #string-input {
            resize: none;
        }

        #string-highlights {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            padding: 0;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .string-highlight {
            position: absolute;
            pointer-events: none;
            opacity: 0.35;
            border-radius: 2px;
            transition: opacity 0.15s;
            z-index: 3;
        }

        .tree-node {
            padding: 2px 0 2px 16px;
            cursor: default;
            font-size: 13px;
            line-height: 1.6;
            position: relative;
        }

        .tree-node:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .tree-node-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tree-toggle {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            color: #6c7086;
            user-select: none;
            flex-shrink: 0;
        }

        .tree-toggle:hover {
            color: #cdd6f4;
        }

        .tree-toggle.empty {
            visibility: hidden;
        }

        .tree-rule-name {
            font-weight: 500;
        }

        .tree-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            letter-spacing: 0.3px;
        }

        .tree-badge.match {
            background: rgba(166, 227, 161, 0.15);
            color: #a6e3a1;
            border: 1px solid rgba(166, 227, 161, 0.3);
        }

        .tree-badge.fail {
            background: rgba(243, 139, 168, 0.15);
            color: #f38ba8;
            border: 1px solid rgba(243, 139, 168, 0.3);
        }

        .tree-data {
            color: #6c7086;
            font-size: 12px;
            margin-left: 4px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-pos {
            color: #585b70;
            font-size: 11px;
            margin-left: auto;
        }

        .tree-children {
            display: none;
        }

        .tree-children.open {
            display: block;
        }

        .color-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .match-node {
            padding: 3px 8px 3px 16px;
            font-size: 13px;
            line-height: 1.6;
            cursor: default;
            display: flex;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 4px;
        }

        .match-node:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .match-rule-name {
            font-weight: 600;
            color: #89b4fa;
        }

        .match-data {
            color: #a6e3a1;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .match-children {
            padding-left: 12px;
            width: 100%;
        }

        #error-bar {
            padding: 8px 12px;
            background: #f38ba8;
            color: #1e1e2e;
            font-size: 13px;
            display: none;
            flex-shrink: 0;
        }

        #error-bar.visible {
            display: block;
        }

        #status-bar {
            padding: 4px 12px;
            font-size: 11px;
            color: #585b70;
            background: #11111b;
            flex-shrink: 0;
            text-align: center;
        }

        #status-bar.connected {
            color: #a6e3a1;
        }

        #status-bar.reconnecting {
            color: #f9e2af;
        }

        #status-bar.error {
            color: #f38ba8;
        }

        /* Panel toggles bar */
        #panel-toggles {
            display: flex;
            padding: 4px 10px;
            gap: 12px;
            background: #11111b;
            flex-shrink: 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .panel-toggle {
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
            opacity: 0.4;
            transition: opacity 0.15s;
        }

        .panel-toggle:hover {
            opacity: 0.7;
        }

        .panel-toggle input {
            display: none;
        }

        .panel-toggle input:checked ~ * {
            opacity: 1;
        }

        .panel-toggle:has(input:checked) {
            opacity: 1;
        }

        .toggle-icon {
            font-size: 10px;
        }

        .toolbar-spacer {
            flex: 1;
        }

        .toolbar-btn {
            background: none;
            border: 1px solid #45475a;
            color: #cdd6f4;
            cursor: pointer;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .toolbar-btn.disabled {
            opacity: 0.35;
            cursor: default;
            pointer-events: none;
        }

        .toolbar-btn.disabled:hover {
            background: none;
            color: #a6adc8;
        }

        #theme-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
            outline: none;
        }

        #theme-select:hover {
            background: #313244;
            color: #cdd6f4;
        }

        #theme-select option {
            background: #1e1e2e;
            color: #cdd6f4;
            text-transform: none;
            letter-spacing: 0;
        }

        .toolbar-btn.copied {
            border-color: #a6e3a1;
            color: #a6e3a1;
        }

        /* Resize handles */
        .resize-handle {
            flex-shrink: 0;
            z-index: 10;
            background: transparent;
            transition: background 0.15s;
        }

        .resize-handle.dir-col {
            width: 4px;
            cursor: col-resize;
        }

        .resize-handle.dir-col:hover,
        .resize-handle.dir-col.resizing {
            background: #89b4fa;
        }

        .resize-handle.dir-row {
            height: 4px;
            cursor: row-resize;
        }

        .resize-handle.dir-row:hover,
        .resize-handle.dir-row.resizing {
            background: #89b4fa;
        }

        body.resizing {
            user-select: none;
            pointer-events: none;
        }

        /* Make trace and match panels visible */
        .panel-header.my-header {
            color: #cdd6f4;
        }

        @media (max-width: 768px) {
            #panel-area {
                flex-direction: column;
            }

            #right-top-row {
                flex-direction: column;
            }

            .panel {
                min-height: 200px;
            }

            #right-top-row>.panel {
                flex: 1;
            }

            #made-panel {
                flex: 0 0 200px;
            }

            .editor-container {
                height: 200px;
                min-height: 200px;
            }

            .panel-body {
                min-height: 200px;
            }

            #string-highlights {
                height: auto;
                min-height: 180px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="panel-toggles">
            <label class="panel-toggle" data-panel="trace">
                <input type="checkbox" checked>
                <span class="toggle-icon">👁</span>
                <span>Trace</span>
            </label>
            <label class="panel-toggle" data-panel="match">

                <span class="toggle-icon">👁</span>

            <label class="panel-toggle" data-panel="grammar">
                <input type="checkbox" checked>
                <span class="toggle-icon">👁</span>

            <label class="panel-toggle" data-panel="string">

            <label class="panel-toggle" data-panel="actions">

            <button class="toolbar-btn" id="btn-pro" title="PRO: show all panels">PRO</button>

                            <button class="panel-header-btn" data-action="save-actions"

                            <button class="panel-header-btn" data-action="open-actions"

                    <div class="panel-body">

                            <pre id="actions-highlight"><code id="actions-highlight-output"></code></pre>

                            <pre id="string-colored"><code id="string-colored-output"></code></pre>

    <script src="perl6.js" defer></script>

    <script type="text/perl6">
use MONKEY-SEE-NO-EVAL;

sub to-json($val) {
    given $val {
        when Hash {
            my @parts;
            for .kv -> $k, $v {
                @parts.push: to-json(~$k) ~ ':' ~ to-json($v);
            }
            return '{' ~ @parts.join(',') ~ '}';
        }
        when Array {
            return '[' ~ $_.map({ to-json($_) }).join(',') ~ ']';
        }
        when Str {
            my $esc = $_.trans(['"','\\',"\n","\t","\r"] => ['\"','\\\\','\n','\t','\r']);
            return '"' ~ $esc ~ '"';
        }
        when Int { return ~$_; }
        when Num { return ~$_; }
        when Bool { return $_ ?? 'true' !! 'false'; }
        default { return '"' ~ .Str.trans(['"','\\'] => ['\"','\\\\']) ~ '"'; }
    }
}

sub serialize-match($m, :$rule-name = 'TOP') {
    my %node = :rule($rule-name), :data($m.Str), :pos_start($m.from), :pos_end($m.to);
    my @children;
    if $m.hash -> %h {
        for %h.kv -> $name, $val {
            my @subs = $val ~~ List ?? $val.list !! ($val,);
            for @subs -> $sub {
                @children.push: serialize-match($sub, :rule-name($name));
            }
        }
    }
    if $m.list -> @l {
        for @l.kv -> $i, $sub {
            @children.push: serialize-match($sub, :rule-name(~$i));
        }
    }
    %node<children> = @children if @children;
    return %node;
}

sub process-grammar($grammar-name, $string, $actions-class?) {
    CATCH {
        default {
            EVAL :lang<JavaScript>, 'window._grammarResult(' ~ to-json({error => .Str}) ~ ')';
            return;
        }
    }
    my $grammar = ::($grammar-name);
    my $actions-obj;
    if $actions-class.defined && $actions-class.trim {
        $actions-obj = ::($actions-class).new;
    }
    my $match = $actions-obj.defined
        ?? $grammar.parse($string, :actions($actions-obj))
        !! $grammar.parse($string);
    my %result;
    if $match {
        %result<match> = serialize-match($match);
        my $made = $match.made;
        %result<made> = $made.raku if $made.defined;
    }
    EVAL :lang<JavaScript>, 'window._grammarResult(' ~ to-json(%result) ~ ')';
}

EVAL :lang<JavaScript>, 'window._perl6Ready()';
    </script>

    <script>
        const GRAMMAR_DEFAULT = `grammar MyGrammar {
token TOP       { <letter>+ }
token letter    { <vowel> || <consonant> }
token vowel     { <[aeiou]> }
token consonant { <[bcdfghjklmnpqrstvwxyz]> }
}`;

        const STRING_DEFAULT = `hello`;

        const RAKU_KEYWORDS = /\b(grammar|token|rule|regex|method|proto|multi|use|unit|module|class|role|sub|my|our|has|returns|is|where|does|but|also|of|as)\b/;
        const BUILTIN_KEYWORDS = /\b(say|print|put|note|dd|die|fail|warn|return|require|need|use|import)\b/;

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function span(cls, text) {
            return '<span class="' + cls + '">' + escapeHtml(text) + '</span>';
        }

        function highlightRaku(code) {
            if (!code) return '';
            let html = '';
            const chars = [...code];
            const len = chars.length;
            let i = 0;

            while (i < len) {
                const ch = chars[i];
                const rest = code.slice(i);

                if (ch === '#') {
                    let j = i; while (j < len && chars[j] !== '\n') j++;
                    html += span('hl-comment', code.slice(i, j)); i = j; continue;
                }
                if (ch === "'" || ch === '"') {
                    const quote = ch; let j = i + 1; let esc = false;
                    while (j < len) { if (esc) { esc = false; j++; continue; } if (chars[j] === '\\') { esc = true; j++; continue; } if (chars[j] === quote) { j++; break; } j++; }
                    html += span('hl-string', code.slice(i, j)); i = j; continue;
                }
                if (ch === '<' && i + 2 < len) {
                    const next = code.slice(i);
                    if (/^<\?before\s/.test(next) || /^<!\s*before\s/.test(next) || /^<\?after\s/.test(next) || /^<!\s*after\s/.test(next) || /^<\?\{/.test(next) || /^<!\s?\{/.test(next)) {
                        let depth = 1, j = i + 1; while (j < len && depth > 0) { if (chars[j] === '>') depth--; else if (chars[j] === '<') depth++; j++; }
                        html += span('hl-assertion', code.slice(i, j)); i = j; continue;
                    }
                    if (/^<\[/.test(next) || /^<\-\[/.test(next) || /^<\+\(/.test(next) || /^<\-\(/.test(next)) {
                        let j = i + 1; while (j < len && chars[j] !== '>') j++; if (j < len) j++;
                        html += span('hl-charclass', code.slice(i, j)); i = j; continue;
                    }
                    let j = i + 1; while (j < len && chars[j] !== '>') j++;
                    if (j < len) { j++; const name = code.slice(i + 1, j - 1); if (/^[a-zA-Z_]\w*$/.test(name)) { html += span(/^[a-z]/.test(name) ? 'hl-rx-builtin' : 'hl-rule-call', code.slice(i, j)); i = j; continue; } }
                    html += escapeHtml(ch); i++; continue;
                }
                if (ch === '$' || ch === '@' || ch === '%' || ch === '&') {
                    if (rest.length >= 2) { const n = rest[1];
                        if (n === '!' || n === '?' || n === '*' || n === '^' || n === '=' || n === '.') { let j = i + 2; while (j < len && /\w/.test(chars[j])) j++; html += span('hl-variable', code.slice(i, j)); i = j; continue; }
                        if (n === '/') { html += span('hl-variable', code.slice(i, i + 2)); i += 2; continue; }
                        if (/\w/.test(n)) { let j = i + 1; while (j < len && (/\w/.test(chars[j]) || chars[j] === "'" || chars[j] === '-')) j++; html += span('hl-variable', code.slice(i, j)); i = j; continue; }
                        if (/[0-9]/.test(n)) { let j = i + 1; while (j < len && /\w/.test(chars[j])) j++; html += span('hl-variable', code.slice(i, j)); i = j; continue; }
                        if (ch === '$' && (n === '/' || n === '_' || n === '!' || n === '~' || n === '=' || n === '?' || n === '%')) { html += span('hl-variable', code.slice(i, i + 2)); i += 2; continue; }
                    }
                    html += escapeHtml(ch); i++; continue;
                }
                if (ch === ':' && i + 1 < len && /[a-zA-Z<\[(:]/.test(chars[i + 1])) {
                    let j = i + 1; if (chars[j] === '(' || chars[j] === '[' || chars[j] === '<') { const close = chars[j] === '(' ? ')' : chars[j] === '[' ? ']' : '>'; j++; let depth = 1; while (j < len && depth > 0) { if (chars[j] === close) depth--; else if (chars[j] === chars[i + 1]) depth++; j++; } html += span('hl-adverb', code.slice(i, j)); i = j; continue; }
                    while (j < len && /\w/.test(chars[j])) j++; if (j > i + 1) { html += span('hl-adverb', code.slice(i, j)); i = j; continue; }
                    html += escapeHtml(ch); i++; continue;
                }
                if (/[A-Z]/.test(ch) && (i === 0 || !/\w/.test(chars[i - 1]))) {
                    let j = i; while (j < len && /\w/.test(chars[j])) j++; const word = code.slice(i, j);
                    if (word.length >= 2 && j < len) { const after = code.slice(j).trimStart(); if (/^\$/.test(after) || /^returns\b/.test(after) || /^is\b/.test(after) || /^of\b/.test(after)) { html += span('hl-type', word); i = j; continue; } }
                }
                if (/[a-zA-Z_]/.test(ch)) {
                    let j = i; while (j < len && /\w/.test(chars[j])) j++; const word = code.slice(i, j);
                    if (RAKU_KEYWORDS.test(word)) { html += span('hl-keyword', word); i = j; continue; }
                    if (BUILTIN_KEYWORDS.test(word)) { html += span('hl-builtin', word); i = j; continue; }
                    if (j < len && chars[j] === '{') { html += span('hl-rule-name', word); i = j; continue; }
                    html += escapeHtml(word); i = j; continue;
                }
                if (ch === '{' || ch === '}') { html += span('hl-brace', ch); i++; continue; }
                if ('+*?'.includes(ch)) { html += span('hl-quantifier', ch); i++; continue; }
                if ((ch === '|' && i + 1 < len && chars[i + 1] === '|') || ch === '|' || (ch === '&' && i + 1 < len && chars[i + 1] === '&') || ch === '&') { let tok = ch; i++; if (i < len && '|&'.includes(chars[i])) { tok += chars[i]; i++; } html += span('hl-alt', tok); continue; }
                if (/[0-9]/.test(ch)) {
                    let j = i; const two = code.slice(i, i + 2);
                    if (two === '0x' || two === '0X') { j = i + 2; while (j < len && /[0-9a-fA-F_]/.test(chars[j])) j++; }
                    else if (two === '0b' || two === '0B') { j = i + 2; while (j < len && /[01_]/.test(chars[j])) j++; }
                    else if (two === '0o' || two === '0O') { j = i + 2; while (j < len && /[0-7_]/.test(chars[j])) j++; }

                    if (j > i) { html += span('hl-number', code.slice(i, j)); i = j; continue; }

                    if (/^(=>|~~|!=|==|<=|>=|<|>|\+=|-=|\*=|%=|\.\.|\+|-|\*|\||&|\^|!)/.test(op)) { html += span('hl-operator', op); i = j; continue; }
                }
                html += escapeHtml(ch);
                i++;
            }
            return html;
        }

        function getRuleColor(ruleName) {
            if (ruleName === 'TOP') return '#6c7086';
            if (!ruleColors.has(ruleName)) {
                ruleColors.set(ruleName, STRING_COLOR_PALETTE[ruleColorIndex % STRING_COLOR_PALETTE.length]);

        function getNodeColor(nodeId) {
            const parts = nodeId.split('/');
            const ruleName = parts[parts.length - 1];
            return getRuleColor(ruleName);

        function storeTraceNode(path, el, rule, posStart, posEnd) {
            traceNodeMap.set(path, el);
            if (posStart != null) {
                tracePosMap.set(rule + ':' + posStart + '-' + posEnd, el);

        function renderTrace(tree) {
            const body = document.getElementById('trace-body');
            traceNodeMap = new Map();
            body.innerHTML = '';
            if (!tree) return;
            body.appendChild(renderTraceNode(tree, 0, ''));

        function renderTraceNode(node, depth, path) {
            const id = path + '/' + (node.rule || '?');
            const color = getNodeColor(id);
            const hasChildren = node.children && node.children.length > 0;

            const container = document.createElement('div');
            container.className = 'tree-node';
            container.dataset.path = id;
            storeTraceNode(id, container, node.rule || '?', node.pos_start, node.pos_end);

            const header = document.createElement('div');
            header.className = 'tree-node-header';

            const toggle = document.createElement('span');
            toggle.className = 'tree-toggle' + (hasChildren ? '' : ' empty');
            if (hasChildren) toggle.textContent = '\u25B8';
            header.appendChild(toggle);

            const dot = document.createElement('span');
            dot.className = 'color-dot';
            dot.style.backgroundColor = color;
            header.appendChild(dot);

            const badge = document.createElement('span');
            badge.className = 'tree-badge ' + (node.match ? 'match' : 'fail');
            badge.textContent = node.match ? 'MATCH' : 'FAIL';
            header.appendChild(badge);

            const name = document.createElement('span');
            name.className = 'tree-rule-name';
            name.textContent = node.rule || '(anonymous)';
            header.appendChild(name);

            if (node.data != null) {
                const data = document.createElement('span');
                data.className = 'tree-data';
                data.textContent = JSON.stringify(node.data);
                header.appendChild(data);
            }

            if (node.pos_start != null) {
                const pos = document.createElement('span');
                pos.className = 'tree-pos';
                pos.textContent = node.pos_start + (node.pos_end !== node.pos_start ? '-' + node.pos_end : '');
                header.appendChild(pos);
            }

            container.appendChild(header);

            container.addEventListener('mouseenter', function () {
                highlightStringRegion(node.pos_start, node.pos_end, color);
                highlightEl(this, color);
                var rule = node.rule || '?';
                var posKey = rule + ':' + node.pos_start + '-' + node.pos_end;
                if (matchPosMap) highlightEl(matchPosMap.get(posKey), color);
            });
            container.addEventListener('mouseleave', function () {
                clearStringHighlights();
                clearTraceHighlights();
                clearMatchHighlights();
            });

            if (hasChildren) {
                toggle.addEventListener('click', function () {
                    var expanded = childrenDiv.classList.toggle('open');
                    toggle.textContent = expanded ? '\u25BE' : '\u25B8';
                });

                var childrenDiv = document.createElement('div');
                childrenDiv.className = 'tree-children';
                for (var i = 0; i < node.children.length; i++) {
                    childrenDiv.appendChild(renderTraceNode(node.children[i], depth + 1, id + '/' + i));
                }
                container.appendChild(childrenDiv);

                if (depth < 2) {
                    childrenDiv.classList.add('open');
                    toggle.textContent = '\u25BE';
                }
            }

            return container;
        }

        // ============================================================
        // String Highlighting
        // ============================================================
        let highlightEls = [];

        function measureCharWidth() {
            const ta = document.getElementById('string-input');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const style = getComputedStyle(ta);
            ctx.font = style.fontSize + ' ' + style.fontFamily;
            return ctx.measureText('A').width;
        }

        function highlightStringRegion(start, end, color) {
            const container = document.getElementById('string-highlights');
            clearStringHighlights();

            if (start == null || end == null) return;
            const text = document.getElementById('string-input').value;
            const clampedStart = Math.max(0, Math.min(start, text.length));
            const clampedEnd = Math.max(clampedStart, Math.min(end, text.length));
            if (clampedStart >= clampedEnd) return;

            const charWidth = measureCharWidth();
            const fontSize = parseFloat(getComputedStyle(document.getElementById('string-input')).fontSize);
            const lineHeight = fontSize * 1.5;

            const lines = text.split('\n');
            let charCount = 0;
            for (let li = 0; li < lines.length; li++) {
                const line = lines[li];
                const lineStart = charCount;
                const lineEnd = charCount + line.length + 1;
                charCount = lineEnd;

                if (clampedStart < lineEnd && clampedEnd > lineStart) {
                    const hlStart = Math.max(clampedStart - lineStart, 0);
                    const hlEnd = Math.min(clampedEnd - lineStart, line.length);

                    if (hlStart < hlEnd) {
                        const el = document.createElement('div');
                        el.className = 'string-highlight';
                        el.style.top = (li * lineHeight) + 'px';
                        el.style.left = (hlStart * charWidth) + 'px';
                        el.style.width = ((hlEnd - hlStart) * charWidth) + 'px';
                        el.style.height = lineHeight + 'px';
                        el.style.backgroundColor = color;
                        container.appendChild(el);
                        highlightEls.push(el);
                    }
                }
            }
        }

        function clearStringHighlights() {
            const container = document.getElementById('string-highlights');
            for (const el of highlightEls) el.remove();
            highlightEls = [];
        }

        // ============================================================
        // String Coloring (permanent foreground coloring by rule name)
        // ============================================================
        function renderStringColored(match) {
            const output = document.getElementById('string-colored-output');
            const textarea = document.getElementById('string-input');
            if (!output || !textarea) return;

            const text = textarea.value;
            if (!match || !text) {
                output.innerHTML = text ? escapeHtml(text) : '';
                return;
            }

            const nodes = [];
            function collect(node, depth) {
                if (node == null) return;
                if (node.pos_start != null && node.pos_end != null && node.match) {
                    nodes.push({
                        start: node.pos_start,
                        end: node.pos_end,
                        rule: node.rule || 'TOP',
                        depth: depth,
                        isLeaf: !node.children || node.children.length === 0
                    });
                }
                if (node.children) {
                    for (const child of node.children) {
                        collect(child, depth + 1);
                    }
                }
            }
            collect(match, 0);

            if (nodes.length === 0) {
                output.innerHTML = escapeHtml(text);
                return;
            }

            const posRule = new Array(text.length);
            for (let i = 0; i < text.length; i++) {
                let bestDepth = -1;
                let bestNode = null;
                for (const node of nodes) {
                    if (i >= node.start && i < node.end && node.depth > bestDepth) {
                        bestDepth = node.depth;
                        bestNode = node;
                    }
                }
                posRule[i] = bestNode;
            }

            let html = '';
            let i = 0;
            while (i < text.length) {
                const node = posRule[i];
                let j = i + 1;
                while (j < text.length && posRule[j] === node) j++;

                const segment = text.slice(i, j);
                const escaped = escapeHtml(segment);

                if (node) {
                    const color = getRuleColor(node.rule);
                    const style = node.isLeaf ? 'color:' + color + ';font-style:italic' : 'color:' + color;
                    html += '<span style="' + style + '">' + escaped + '</span>';
                } else {
                    html += escaped;
                }

                i = j;
            }

            output.innerHTML = html;
        }

        function clearStringColored() {
            const output = document.getElementById('string-colored-output');
            if (output) output.innerHTML = '';
        }

        function extendStringColoring() {
            const output = document.getElementById('string-colored-output');
            const textarea = document.getElementById('string-input');
            if (!output || !textarea) return;

            const text = textarea.value;
            const outputText = output.textContent;

            if (text === outputText) return;

            if (!text) {
                output.innerHTML = '';
                return;
            }

            const cursorPos = textarea.selectionStart;

            if (text.length > outputText.length) {
                if (cursorPos === text.length && text.startsWith(outputText)) {
                    const lastSpan = output.lastElementChild;
                    if (lastSpan && lastSpan.tagName === 'SPAN') {
                        const style = lastSpan.getAttribute('style') || '';
                        const addedText = text.slice(outputText.length);
                        output.innerHTML += '<span style="' + style + '">' + escapeHtml(addedText) + '</span>';
                        return;
                    }
                }
                return;
            }

            if (text.length < outputText.length && cursorPos === text.length) {
                let remaining = outputText.length - text.length;
                let node = output.lastChild;
                while (node && remaining > 0) {
                    const contentNode = node.nodeType === Node.TEXT_NODE ? node : node.firstChild;
                    if (contentNode && contentNode.nodeType === Node.TEXT_NODE) {
                        const len = contentNode.textContent.length;
                        if (len <= remaining) {
                            remaining -= len;
                            const prev = node.previousSibling;
                            node.remove();
                            node = prev;
                        } else {
                            contentNode.textContent = contentNode.textContent.slice(0, len - remaining);
                            remaining = 0;
                        }
                    } else {
                        node = node.previousSibling;
                    }
                }
            }
        }

        // ============================================================
        // In-Browser Grammar Evaluation
        // ============================================================
        let runtimeReady = false;
        let perl6Ready = false;

        window._perl6Ready = function() {
            perl6Ready = true;
        };

        window._grammarResult = function(data) {
            if (data.error) { showError(data.error); return; }
            hideError();
            if (data.match) {
                var trace = buildTrace(data.match, grammarInput.value);
                renderMatch(data.match);
                renderTrace(trace);
                renderStringColored(trace);
            } else {
                clearMatch();
                clearTrace();
            }
            if (data.hasOwnProperty('made')) renderMade(data.made); else clearMade();
        };

        function getAlternations(code) {
            var alts = {};
            var tokenRegex = /token\s+(\w+)\s*\{([^}]*)\}/g;
            var m;
            while ((m = tokenRegex.exec(code)) !== null) {
                if (m[2].indexOf('||') !== -1) {
                    var branches = m[2].match(/<(\w+)>/g);
                    if (branches) {
                        alts[m[1]] = branches.map(function(b) { return b.slice(1, -1); });
                    }
                }
            }
            return alts;
        }

        function getQuantified(code) {
            var q = {};
            var tokenRegex = /token\s+(\w+)\s*\{([^}]*)\}/g;
            var m;
            while ((m = tokenRegex.exec(code)) !== null) {
                var qmatch = m[2].match(/<(\w+)>\+/);
                if (qmatch) { q[m[1]] = qmatch[1]; }
            }
            return q;
        }

        function buildTrace(matchNode, code) {
            var alts = getAlternations(code);
            var quantified = getQuantified(code);
            var stringLen = stringInput.value.length;
            function walk(node) {
                if (!node) return node;
                var n = { rule: node.rule, data: node.data, pos_start: node.pos_start, pos_end: node.pos_end, match: true };
                if (node.children) {
                    var walked = node.children.map(walk);
                    var ruleAlts = alts[node.rule];
                    if (ruleAlts) {
                        n.children = [];
                        var matched = false;
                        for (var i = 0; i < ruleAlts.length; i++) {
                            var alt = ruleAlts[i];
                            var child = walked.filter(function(c) { return c.rule === alt && c.match; })[0];
                            if (child && !matched) {
                                n.children.push(child);
                                matched = true;
                            } else if (!child && !matched) {
                                n.children.push({ rule: alt, data: '', pos_start: node.pos_start, pos_end: node.pos_start, match: false });
                            }
                        }
                    } else {
                        n.children = walked;
                    }
                    // Add trailing fail for quantifiers
                    var innerRule = quantified[node.rule];
                    if (innerRule && n.pos_end === stringLen) {
                        var innerAlts = alts[innerRule] || [innerRule];
                        var trail = { rule: innerRule, data: '', pos_start: stringLen, pos_end: stringLen, match: false };
                        trail.children = [];
                        var innerMatched = false;
                        for (var i = 0; i < innerAlts.length; i++) {
                            if (!innerMatched) {
                                trail.children.push({ rule: innerAlts[i], data: '', pos_start: stringLen, pos_end: stringLen, match: false });
                            }
                        }
                        n.children.push(trail);
                    }
                }
                return n;
            }
            return walk(matchNode);
        }

        let grammarCounter = 0;
        let actionsCounter = 0;

        function runGrammar() {
            if (!runtimeReady || !perl6Ready) return;
            const grammar = document.getElementById('grammar-code').value;
            const actions = document.getElementById('actions-code').value;
            const string = document.getElementById('string-input').value;
            if (!grammar.trim() || !string.trim()) return;
            const perl6Script = document.querySelector('script[type="text/perl6"]');
            const engine = perl6Script ? perl6Script.textContent
                .replace("EVAL :lang<JavaScript>, 'window._perl6Ready()'", '# removed') : '';
            try {
                grammarCounter++;
                const uniqueName = '_G' + grammarCounter;
                const uniqueGrammar = grammar.replace(/(?:unit\s+)?grammar\s+(\w+)/, 'grammar ' + uniqueName);
                var uniqueActions = actions.trim();
                var actionsClassName = '';
                if (uniqueActions) {
                    var nameMap = {};
                    var lastAn = '';
                    uniqueActions = uniqueActions.replace(/class\s+(\w+)/g, function(m, name) {
                        actionsCounter++;
                        var an = '_A' + actionsCounter;
                        nameMap[name] = an;
                        lastAn = an;
                        return 'class ' + an;
                    });
                    actionsClassName = lastAn;
                    for (var oldName in nameMap) {
                        var re = new RegExp('\\b' + oldName + '\\b', 'g');
                        uniqueActions = uniqueActions.replace(re, nameMap[oldName]);
                    }
                }
                var code = engine + '\n' + uniqueGrammar.trim();
                if (uniqueActions) { code += '\n' + uniqueActions; }
                code += '\n;process-grammar(' +
                    JSON.stringify(uniqueName) + ', ' +
                    JSON.stringify(string) + ', ' +
                    (actionsClassName ? JSON.stringify(actionsClassName) : '""') + ')';
                Raku.eval(code);
            } catch (e) {
                console.error('Raku.eval error:', e);
            }
        }

        let debouncedEval = debounce(runGrammar, 300);

        function initRaku() {
            if (typeof window.evalP6 === 'function') {
                window.Raku = { eval: window.evalP6 };
                runtimeReady = true;
                document.getElementById('status-bar').textContent = 'Ready';
                document.getElementById('status-bar').className = 'connected';
                const perl6Script = document.querySelector('script[type="text/perl6"]');
                if (perl6Script) {
                    try {
                        Raku.eval(perl6Script.textContent);
                        runGrammar();
                    }
                    catch (e) { showError('Raku init error: ' + e); }
                }
                return;
            }
            setTimeout(initRaku, 200);
        }
        initRaku();

        const grammarInput = document.getElementById('grammar-code');
        const actionsInput = document.getElementById('actions-code');
        const stringInput = document.getElementById('string-input');
        const highlightOutput = document.getElementById('highlight-output');
        const actionsHighlightOutput = document.getElementById('actions-highlight-output');

        async function updateHighlight() {
            const hi = await getHighlightRaku();
            const code = grammarInput.value;
            highlightOutput.innerHTML = await hi(code);
            const actionsCode = actionsInput.value;
            actionsHighlightOutput.innerHTML = await hi(actionsCode);
        }

        grammarInput.addEventListener('input', () => {
            updateHighlight();
            debouncedEval();
        });

        actionsInput.addEventListener('input', () => {
            updateHighlight();
            debouncedEval();
        });

        stringInput.addEventListener('input', () => {
            extendStringColoring();
            debouncedEval();
        });

        grammarInput.addEventListener('scroll', () => {
            const pre = document.getElementById('grammar-highlight');
            pre.scrollTop = grammarInput.scrollTop;
            pre.scrollLeft = grammarInput.scrollLeft;
        });

        actionsInput.addEventListener('scroll', () => {
            const pre = document.getElementById('actions-highlight');
            pre.scrollTop = actionsInput.scrollTop;
            pre.scrollLeft = actionsInput.scrollLeft;
        });

        stringInput.addEventListener('scroll', () => {
            const pre = document.getElementById('string-colored');
            pre.scrollTop = stringInput.scrollTop;
            pre.scrollLeft = stringInput.scrollLeft;
        });

        // Tab handling
        function handleTabKey(e, input, afterEdit) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + '\t' + input.value.substring(end);
                input.selectionStart = input.selectionEnd = start + 1;
                if (afterEdit) afterEdit();
            }
            if ((e.key === 'Enter' && e.ctrlKey) || (e.key === 'Enter' && e.metaKey)) {
                e.preventDefault();
                runGrammar();
            }
        }

        grammarInput.addEventListener('keydown', (e) => {
            handleTabKey(e, grammarInput, () => { updateHighlight(); debouncedEval(); });
        });

        actionsInput.addEventListener('keydown', (e) => {
            handleTabKey(e, actionsInput, () => { updateHighlight(); debouncedEval(); });
        });

        // Panel toggles
        function updateRightHalf() {
            setupResizeHandles();
            var trace = document.getElementById('trace-panel');
            var match = document.getElementById('match-panel');
            var made = document.getElementById('made-panel');
            var rightHalf = document.getElementById('right-half');
            var rightTopRow = document.getElementById('right-top-row');
            var leftHalf = document.getElementById('left-half');

            var anyVisible = 0;
            if (!trace.classList.contains('collapsed')) anyVisible++;
            if (!match.classList.contains('collapsed')) anyVisible++;
            if (!made.classList.contains('collapsed')) anyVisible++;

            if (anyVisible === 0) {
                rightHalf.classList.add('hidden');
                leftHalf.style.flex = '1';
                return;
            }
            rightHalf.classList.remove('hidden');
            rightHalf.style.flex = '1';
            leftHalf.style.flex = '1';

            var topVisible = 0;
            if (!trace.classList.contains('collapsed')) topVisible++;
            if (!match.classList.contains('collapsed')) topVisible++;

            if (topVisible === 0) {
                rightTopRow.style.display = 'none';
                made.style.flex = '1';
            } else {
                rightTopRow.style.display = '';
                made.style.flex = '';
                if (topVisible === 1) {
                    rightTopRow.classList.add('single');
                } else {
                    rightTopRow.classList.remove('single');
                }
            }
        }

        document.querySelectorAll('.panel-toggle input').forEach(function (cb) {
            cb.addEventListener('change', function () {
                var toggle = this.closest('.panel-toggle');
                var panel = document.getElementById(toggle.dataset.panel + '-panel');
                if (panel) {
                    panel.classList.toggle('collapsed', !this.checked);
                    updateRightHalf();
                    updateViewModeButtons();
                }
            });
        });

        function isPanelCollapsed(id) {
            var el = document.getElementById(id + '-panel');
            return !el || el.classList.contains('collapsed');
        }

        function updateViewModeButtons() {
            var dsl = document.getElementById('btn-dsl');
            var pro = document.getElementById('btn-pro');
            if (!dsl || !pro) return;

            var dslActive = isPanelCollapsed('grammar') && isPanelCollapsed('actions') &&
                isPanelCollapsed('trace') && isPanelCollapsed('match') &&
                !isPanelCollapsed('string') && !isPanelCollapsed('made');

            var proActive = !isPanelCollapsed('grammar') && !isPanelCollapsed('actions') &&
                !isPanelCollapsed('trace') && !isPanelCollapsed('match') &&
                !isPanelCollapsed('string') && !isPanelCollapsed('made');

            dsl.classList.toggle('disabled', dslActive);
            pro.classList.toggle('disabled', proActive);
        }

        document.getElementById('btn-dsl').addEventListener('click', function () {
            if (this.classList.contains('disabled')) return;
            resetPanelSizes();
            setPanel('grammar', false);
            setPanel('actions', false);
            setPanel('trace', false);
            setPanel('match', false);
            setPanel('string', true);
            setPanel('made', true);
            updateRightHalf();
            updateViewModeButtons();
        });

        document.getElementById('btn-pro').addEventListener('click', function () {
            if (this.classList.contains('disabled')) return;
            resetPanelSizes();
            setPanel('grammar', true);
            setPanel('actions', true);
            setPanel('trace', true);
            setPanel('match', true);
            setPanel('string', true);
            setPanel('made', true);
            updateRightHalf();
            updateViewModeButtons();
        });

        function resetPanelSizes() {
            ['left-half', 'right-half', 'right-top-row',
             'grammar-panel', 'actions-panel', 'string-panel',
             'trace-panel', 'match-panel', 'made-panel'].forEach(function (id) {
                var el = document.getElementById(id);
                if (el) el.style.flex = '';
            });
        }

        function setPanel(id, visible) {
            var el = document.getElementById(id + '-panel');
            if (!el) return;
            el.classList.toggle('collapsed', !visible);
            var toggle = document.querySelector('.panel-toggle[data-panel="' + id + '"] input');
            if (toggle) toggle.checked = visible;
        }

        // ============================================================
        // Theme Selector
        // ============================================================
        (function initThemeSelect() {
            var sel = document.getElementById('theme-select');
            if (!sel) return;
            Object.keys(PALETTE_REGISTRY).forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            sel.value = activePaletteName;
            sel.addEventListener('change', function () {
                setActivePalette(this.value);
                if (_setShikiTheme) {
                    var name = this.value;
                    var entry = PALETTE_REGISTRY[name];
                    if (entry) _setShikiTheme(entry.shiki);
                }
                updateHighlight();
                debouncedEval();
            });
        })();

        // ============================================================
        // Resize Handles
        // ============================================================
        function makeResizeHandle(handleEl, prevEl, nextEl, direction) {
            var startPos, startPrev, startNext;

            function onMouseDown(e) {
                e.preventDefault();
                startPos = direction === 'row' ? e.clientY : e.clientX;
                startPrev = direction === 'row' ? prevEl.offsetHeight : prevEl.offsetWidth;
                startNext = direction === 'row' ? nextEl.offsetHeight : nextEl.offsetWidth;
                handleEl.classList.add('resizing');
                document.body.classList.add('resizing');
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }

            function onMouseMove(e) {
                var pos = direction === 'row' ? e.clientY : e.clientX;
                var delta = pos - startPos;
                var total = startPrev + startNext;
                var prevRatio = (startPrev + delta) / total;
                var nextRatio = (startNext - delta) / total;
                if (prevRatio < 0.1 || nextRatio < 0.1) return;
                if (direction === 'row') {
                    prevEl.style.flex = prevRatio.toFixed(4);
                    nextEl.style.flex = nextRatio.toFixed(4);
                } else {
                    prevEl.style.flex = prevRatio.toFixed(4);
                    nextEl.style.flex = nextRatio.toFixed(4);
                }
            }

            function onMouseUp() {
                handleEl.classList.remove('resizing');
                document.body.classList.remove('resizing');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            handleEl.addEventListener('mousedown', onMouseDown);
        }

        function insertResizeHandle(prev, next, dir) {
            var handle = document.createElement('div');
            handle.className = 'resize-handle dir-' + dir;
            prev.parentNode.insertBefore(handle, next);
            makeResizeHandle(handle, prev, next, dir);
            return handle;
        }

        function setupResizeHandles() {
            var handles = document.querySelectorAll('.resize-handle');
            handles.forEach(function (h) { h.remove(); });

            // Between left-half and right-half
            var leftHalf = document.getElementById('left-half');
            var rightHalf = document.getElementById('right-half');
            if (leftHalf && rightHalf) {
                insertResizeHandle(leftHalf, rightHalf, 'col');
            }

            // Between grammar and actions panels
            var grammarPanel = document.getElementById('grammar-panel');
            var actionsPanel = document.getElementById('actions-panel');
            if (grammarPanel && actionsPanel && !grammarPanel.classList.contains('collapsed') && !actionsPanel.classList.contains('collapsed')) {
                insertResizeHandle(grammarPanel, actionsPanel, 'row');
            }

            // Between actions and string panels
            var stringPanel = document.getElementById('string-panel');
            if (actionsPanel && stringPanel && !actionsPanel.classList.contains('collapsed') && !stringPanel.classList.contains('collapsed')) {
                insertResizeHandle(actionsPanel, stringPanel, 'row');
            }

            // Between trace and match panels
            var tracePanel = document.getElementById('trace-panel');
            var matchPanel = document.getElementById('match-panel');
            if (tracePanel && matchPanel && !tracePanel.classList.contains('collapsed') && !matchPanel.classList.contains('collapsed')) {
                insertResizeHandle(tracePanel, matchPanel, 'col');
            }

            // Between right top row and made panel
            var rightTopRow = document.getElementById('right-top-row');
            var madePanel = document.getElementById('made-panel');
            if (rightTopRow && madePanel && !madePanel.classList.contains('collapsed')) {
                insertResizeHandle(rightTopRow, madePanel, 'row');
            }
        }

        // ============================================================
        // File Save / Open
        // ============================================================
        async function saveFileAs(content, suggestedName, fallbackName) {
            const blob = new Blob([content], {type: 'text/plain'});
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({suggestedName});
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    return;
                } catch (e) {
                    if (e.name === 'AbortError') return;
                }
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fallbackName || suggestedName;
            a.click();
            URL.revokeObjectURL(url);
        }

        function openFileViaInput(inputId) {
            return new Promise(resolve => {
                const input = document.getElementById(inputId);
                input.value = '';
                const handler = function () {
                    input.removeEventListener('change', handler);
                    const file = input.files[0];
                    if (!file) {resolve(null); return;}
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => resolve(null);
                    reader.readAsText(file);
                };
                input.addEventListener('change', handler);
                input.click();
            });
        }

        async function pickAndReadFile(accept, inputId) {
            if ('showOpenFilePicker' in window) {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{description: 'Files', accept: {'text/plain': accept}}],
                        multiple: false
                    });
                    const file = await handle.getFile();
                    return await file.text();
                } catch (e) {
                    if (e.name === 'AbortError') return null;
                }
            }
            return openFileViaInput(inputId);
        }

        async function saveActions() {
            const code = actionsInput.value;
            await saveFileAs(code, 'actions-' + new Date().toISOString().slice(0,10) + '.rakumod');
        }

        async function saveGrammar() {
            const code = grammarInput.value;
            await saveFileAs(code, 'grammar-' + new Date().toISOString().slice(0,10) + '.rakumod');
        }

        async function saveString() {
            const code = stringInput.value;
            await saveFileAs(code, 'input.txt');
        }

        async function openGrammar() {
            const content = await pickAndReadFile(['.rakumod', '.raku', '.grammar'], 'grammar-file-input');
            if (content == null) return;
            grammarInput.value = content;
            updateHighlight();
            debouncedEval();
        }

        async function openActions() {
            const content = await pickAndReadFile(['.rakumod', '.raku'], 'grammar-file-input');
            if (content == null) return;
            actionsInput.value = content;
            updateHighlight();
            debouncedEval();
        }

        async function openString() {
            const content = await pickAndReadFile(['.txt'], 'string-file-input');
            if (content == null) return;
            stringInput.value = content;
            debouncedEval();
        }

        // Save/Open button handlers
        document.querySelectorAll('[data-action="save-grammar"]').forEach(b => b.addEventListener('click', saveGrammar));
        document.querySelectorAll('[data-action="save-actions"]').forEach(b => b.addEventListener('click', saveActions));
        document.querySelectorAll('[data-action="save-string"]').forEach(b => b.addEventListener('click', saveString));
        document.querySelectorAll('[data-action="open-grammar"]').forEach(b => b.addEventListener('click', openGrammar));
        document.querySelectorAll('[data-action="open-actions"]').forEach(b => b.addEventListener('click', openActions));
        document.querySelectorAll('[data-action="open-string"]').forEach(b => b.addEventListener('click', openString));

        // Share button handler
        function encodeState() {
            const g = grammarInput.value;
            const a = actionsInput.value;
            const s = stringInput.value;
            return btoa(encodeURIComponent(JSON.stringify({g, a, s})));
        }

        function decodeState(hash) {
            try { return JSON.parse(decodeURIComponent(atob(hash))); }
            catch { return null; }
        }

        async function copyShareUrl() {
            const url = window.location.origin + window.location.pathname + '#' + encodeState();
            if (window.isSecureContext && navigator.clipboard) {
                await navigator.clipboard.writeText(url).catch(function () {
                    prompt('Copy this share URL:', url);
                });
            } else {
                prompt('Copy this share URL:', url);
            }
            showCopied();
        }

        function showCopied() {
            const btn = document.getElementById('btn-share');
            btn.textContent = '🔗 Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '🔗 Share';
                btn.classList.remove('copied');
            }, 2000);
        }

        document.getElementById('btn-share').addEventListener('click', copyShareUrl);

        // Initial load
        grammarInput.value = GRAMMAR_DEFAULT;
        stringInput.value = STRING_DEFAULT;
        updateHighlight();
        // Try to restore from hash fragment
        if (window.location.hash) {
            const state = decodeState(window.location.hash.slice(1));
            if (state) {
                if (state.g) grammarInput.value = state.g;
                if (state.a) { actionsInput.value = state.a; document.getElementById('actions-panel').classList.remove('collapsed'); }
                if (state.s) stringInput.value = state.s;
                updateHighlight();
            }
        }
        renderStringColored(null);
        updateRightHalf();
        updateViewModeButtons();
    </script>
