<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slangify Playground</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            background: #1e1e2e;
            color: #cdd6f4;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #45475a;
        }

        #panel-area {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 2px;
        }

#left-half {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        #right-half {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        #right-half.hidden {
            display: none;
        }

        #right-top-row {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: row;
            gap: 2px;
            overflow: hidden;
        }

        #right-top-row>.panel {
            flex: 0 0 50%;
        }

        #right-top-row.single>.panel:not(.collapsed) {
            flex: 1;
        }

        #made-panel {
            flex: 0 0 25%;
        }

        #made-panel.collapsed {
            display: none;
        }

        .panel {
            background: #1e1e2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #181825;
            color: #a6adc8;
            border-bottom: 1px solid #313244;
            user-select: none;
        }

        .panel-header-btns {
            display: flex;
            gap: 6px;
        }

        .panel-header-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1;
            color: #a6adc8;
            transition: background 0.15s, color 0.15s;
        }

        .panel-header-btn:hover {
            background: #313244;
            color: #cdd6f4;
        }

        .toolbar-spacer {
            flex: 1;
        }

        .toolbar-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            color: #a6adc8;
            transition: background 0.15s, color 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .toolbar-btn:hover {
            background: #313244;
            color: #cdd6f4;
        }

        .toolbar-btn.copied {
            color: #a6e3a1;
        }

        .toolbar-btn.active {
            background: #313244;
            color: #cdd6f4;
        }

        .toolbar-btn.disabled {
            opacity: 0.35;
            cursor: default;
            pointer-events: none;
        }

        .toolbar-btn.disabled:hover {
            background: none;
            color: #a6adc8;
        }

        #theme-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
            outline: none;
        }

        #theme-select:hover {
            background: #313244;
            color: #cdd6f4;
        }

        #theme-select option {
            background: #1e1e2e;
            color: #cdd6f4;
            text-transform: none;
            letter-spacing: 0;
        }

        #panel-toggles {
            display: flex;
            gap: 2px;
            padding: 4px 8px;
            background: #181825;
            border-bottom: 1px solid #313244;
            flex-shrink: 0;
        }

        #panel-toggles.dsl-mode .panel-toggle {
            display: none;
        }

        .panel-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #a6adc8;
            padding: 2px 8px 2px 4px;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .panel-toggle:hover {
            background: #313244;
        }

        .panel-toggle input {
            display: none;
        }

        .panel-toggle .toggle-icon {
            font-size: 13px;
            line-height: 1;
            opacity: 0.6;
            transition: opacity 0.15s;
        }

        .panel-toggle:hover .toggle-icon {
            opacity: 1;
        }

        .panel-toggle input:not(:checked)~.toggle-icon {
            opacity: 0.25;
        }

        .panel-toggle input:not(:checked)~span {
            opacity: 0.4;
        }

        .panel.collapsed {
            display: none;
        }

        .panel-body {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .editor-container {
            position: relative;
            height: 100%;
        }

        .editor-container textarea,
        .editor-container pre {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 10px;
            margin: 0;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            line-height: 1.5;
            tab-size: 4;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            background: transparent;
        }

        .editor-container textarea {
            z-index: 2;
            color: transparent;
            caret-color: #cdd6f4;
            resize: none;
            background: transparent;
        }

        .editor-container pre {
            z-index: 1;
            color: #cdd6f4;
            pointer-events: none;
        }

        .editor-container pre code {
            font-family: inherit;
            font-size: inherit;
            line-height: 1.5;
        }

        #string-input {
            resize: none;
        }
 
        #string-highlights {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            padding: 0;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .string-highlight {
            position: absolute;
            pointer-events: none;
            opacity: 0.35;
            border-radius: 2px;
            transition: opacity 0.15s;
            z-index: 3;
        }

        .tree-node {
            padding: 2px 0 2px 16px;
            cursor: default;
            font-size: 13px;
            line-height: 1.6;
            position: relative;
        }

        .tree-node:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .tree-node-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tree-toggle {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            color: #6c7086;
            user-select: none;
            flex-shrink: 0;
        }

        .tree-toggle:hover {
            color: #cdd6f4;
        }

        .tree-toggle.empty {
            visibility: hidden;
        }

        .tree-rule-name {
            font-weight: 500;
        }

        .tree-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            letter-spacing: 0.3px;
        }

        .tree-badge.match {
            background: rgba(166, 227, 161, 0.15);
            color: #a6e3a1;
            border: 1px solid rgba(166, 227, 161, 0.3);
        }

        .tree-badge.fail {
            background: rgba(243, 139, 168, 0.15);
            color: #f38ba8;
            border: 1px solid rgba(243, 139, 168, 0.3);
        }

        .tree-data {
            color: #6c7086;
            font-size: 12px;
            margin-left: 4px;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-pos {
            color: #585b70;
            font-size: 11px;
            margin-left: auto;
        }

        .tree-children {
            display: none;
        }

        .tree-children.open {
            display: block;
        }

        .color-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        #error-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 12px;
            background: rgba(243, 139, 168, 0.12);
            border-top: 1px solid rgba(243, 139, 168, 0.3);
            color: #f38ba8;
            font-size: 13px;
            line-height: 1.4;
            max-height: 80px;
            overflow-y: auto;
            z-index: 50;
        }

        #error-bar.visible {
            display: block;
        }

        #status-bar {
            position: fixed;
            bottom: 8px;
            right: 12px;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            background: rgba(24, 24, 37, 0.9);
            color: #6c7086;
            z-index: 100;
            transition: all 0.3s;
        }

        #status-bar.connected {
            color: #a6e3a1;
        }

        #status-bar.reconnecting {
            color: #f9e2af;
            animation: pulse 1.5s infinite;
        }

        #status-bar.error {
            color: #f38ba8;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .match-node {
            padding: 2px 0 2px 16px;
            font-size: 13px;
            line-height: 1.6;
        }

        .match-rule-name {
            font-weight: 500;
        }

        .match-data {
            color: #a6e3a1;
            margin-left: 4px;
        }

        .match-children {
            padding-left: 16px;
        }

        #trace-body,
        #match-body {
            padding: 4px 0;
            font-size: 13px;
        }

        .resize-handle {
            flex: 0 0 4px;
            position: relative;
            background: #313244;
            transition: background 0.15s;
            z-index: 10;
        }

        .resize-handle:hover {
            background: #585b70;
        }

        .resize-handle.dir-row {
            cursor: row-resize;
        }

        .resize-handle.dir-col {
            cursor: col-resize;
        }

        .resize-handle.resizing {
            background: #89b4fa;
        }

        body.resizing {
            user-select: none;
            -webkit-user-select: none;
        }

        @media (max-width: 768px) {

            html,
            body {
                overflow: auto;
            }

            #app {
                height: auto;
                min-height: 100vh;
            }

            #panel-area {
                flex-direction: column;
            }

            #left-half,
            #right-half {
                flex: none;
                width: 100%;
            }

            #right-half {
                flex-direction: column;
            }

            .panel {
                min-height: 200px;
            }

            .panel-body {
                min-height: 0;
                overflow: hidden;
            }

            .editor-container {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                height: auto;
            }

            #string-highlights {
                height: auto;
                min-height: 180px;
            }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "shiki": "https://esm.sh/shiki@4.0.2?bundle"
            }
        }
    </script>
</head>

<body>

    <div id="app">
        <div id="panel-toggles" class="dsl-mode">
            <button class="toolbar-btn active" id="btn-dsl" title="DSL: show Input + Made only">DSL</button>
            <label class="panel-toggle" data-panel="string" style="display:none">
                <input type="checkbox" checked>
                <span class="toggle-icon">👁</span>
                <span>Input</span>
            </label>
            <label class="panel-toggle" data-panel="grammar" style="display:none">
                <input type="checkbox">
                <span class="toggle-icon">👁</span>
                <span>Grammar</span>
            </label>
            <label class="panel-toggle" data-panel="actions" style="display:none">
                <input type="checkbox">
                <span class="toggle-icon">👁</span>
                <span>Actions</span>
            </label>
            <label class="panel-toggle" data-panel="trace" style="display:none">
                <input type="checkbox">
                <span class="toggle-icon">👁</span>
                <span>Trace</span>
            </label>
            <label class="panel-toggle" data-panel="match" style="display:none">
                <input type="checkbox">
                <span class="toggle-icon">👁</span>
                <span>Match</span>
            </label>
            <label class="panel-toggle" data-panel="made" style="display:none">
                <input type="checkbox" checked>
                <span class="toggle-icon">👁</span>
                <span>Made</span>
            </label>
            <button class="toolbar-btn" id="btn-pro" title="PRO: show all panels">PRO</button>
            <span class="toolbar-spacer"></span>
            <select id="theme-select" class="toolbar-btn" title="Select color theme"></select>
            <button class="toolbar-btn" id="btn-share" title="Copy shareable URL">🔗 Share</button>
        </div>
        <div id="panel-area">
            <div id="left-half">
                <div class="panel collapsed" id="grammar-panel">
                    <div class="panel-header">
                        <span>Grammar</span>
                        <div class="panel-header-btns">
                            <button class="panel-header-btn" data-action="save-grammar"
                                title="Save as .raku">💾</button>
                            <button class="panel-header-btn" data-action="open-grammar"
                                title="Open .raku file">📂</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="editor-container">
                            <textarea id="grammar-code" spellcheck="false" autofocus></textarea>
                            <pre id="grammar-highlight"><code id="highlight-output"></code></pre>
                        </div>
                    </div>
                </div>

                <div class="panel collapsed" id="actions-panel">
                    <div class="panel-header">
                        <span>Actions</span>
                        <div class="panel-header-btns">
                            <button class="panel-header-btn" data-action="save-actions"
                                title="Save as .rakumod">💾</button>
                            <button class="panel-header-btn" data-action="open-actions"
                                title="Open .rakumod file">📂</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="editor-container">
                            <textarea id="actions-code" spellcheck="false" placeholder="class MyActions { ... }"></textarea>
                            <pre id="actions-highlight"><code id="actions-highlight-output"></code></pre>
                        </div>
                    </div>
                </div>

                <div class="panel" id="string-panel">
                    <div class="panel-header">
                        <span>Input</span>
                        <div class="panel-header-btns">
                            <button class="panel-header-btn" data-action="save-string" title="Save as .txt">💾</button>
                            <button class="panel-header-btn" data-action="open-string"
                                title="Open .txt file">📂</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="editor-container">
                            <textarea id="string-input" spellcheck="false"></textarea>
                            <pre id="string-colored"><code id="string-colored-output"></code></pre>
                            <div id="string-highlights"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="right-half">
                <div id="right-top-row" style="display:none">
                    <div class="panel collapsed" id="trace-panel">
                        <div class="panel-header">Trace</div>
                        <div class="panel-body" id="trace-body"></div>
                    </div>

                    <div class="panel collapsed" id="match-panel">
                        <div class="panel-header">Match</div>
                        <div class="panel-body" id="match-body"></div>
                    </div>
                </div>

                <div class="panel" id="made-panel" style="flex:1">
                    <div class="panel-header">Made</div>
                    <div class="panel-body" id="made-body"></div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="grammar-file-input" accept=".rakumod,.raku,.grammar" style="display:none">
    <input type="file" id="string-file-input" accept=".txt" style="display:none">

    <div id="status-bar">Disconnected</div>
    <div id="error-bar"></div>

    <script>
        const GRAMMAR_DEFAULT = `unit grammar MyGrammar;

token TOP       { <letter>+ }
token letter    { <vowel> || <consonant> }
token vowel     { <[aeiou]> }
token consonant { <[bcdfghjklmnpqrstvwxyz]> }`;

        const STRING_DEFAULT = `hello`;

        // ============================================================
        // Raku Grammar Syntax Highlighting
        // ============================================================
        let _highlightRaku = null;
        let _setShikiTheme = null;
        async function getHighlightRaku() {
            if (!_highlightRaku) {
                try {
                    const m = await import('./js/highlight.js');
                    _highlightRaku = m.default;
                    _setShikiTheme = m.setShikiTheme;
                } catch {
                    _highlightRaku = function (c) {
                        return c ? c.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
                    };
                }
            }
            return _highlightRaku;
        }

        function debounce(fn, ms) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), ms);
            };
        }

        // ============================================================
        // Trace / Node Colors
        // ============================================================
        function getNodeColor(nodeId) {
            // nodeId format: "/TOP/0/letter/0/vowel" — extract rule name from last segment
            const parts = nodeId.split('/');
            const ruleName = parts[parts.length - 1];
            return getRuleColor(ruleName);
        }

        function resetColors() {
            ruleColors = new Map();
            ruleColorIndex = 0;
        }

        // ============================================================
        // Trace Rendering
        // ============================================================
        let traceNodeMap = new Map();
        let tracePosMap = new Map();

        function storeTraceNode(path, el, rule, posStart, posEnd) {
            traceNodeMap.set(path, el);
            if (posStart != null) {
                tracePosMap.set(rule + ':' + posStart + '-' + posEnd, el);
            }
        }

        function highlightEl(el, color) {
            if (el) {
                el.style.outline = '2px solid ' + color;
                el.style.outlineOffset = '-2px';
            }
        }

        function clearEl(el) {
            if (el) {
                el.style.outline = '';
                el.style.outlineOffset = '';
            }
        }

        function clearTraceHighlights() {
            for (const el of traceNodeMap.values()) {
                clearEl(el);
            }
        }

        function renderTrace(tree) {
            const body = document.getElementById('trace-body');
            traceNodeMap = new Map();
            body.innerHTML = '';
            if (!tree) return;
            body.appendChild(renderTraceNode(tree, 0, ''));
        }

        function renderTraceNode(node, depth, path) {
            const id = path + '/' + (node.rule || '?');
            const color = getNodeColor(id);
            const hasChildren = node.children && node.children.length > 0;

            const container = document.createElement('div');
            container.className = 'tree-node';
            container.dataset.path = id;
            storeTraceNode(id, container, node.rule || '?', node.pos_start, node.pos_end);

            const header = document.createElement('div');
            header.className = 'tree-node-header';

            const toggle = document.createElement('span');
            toggle.className = 'tree-toggle' + (hasChildren ? '' : ' empty');
            if (hasChildren) toggle.textContent = '\u25B8';
            header.appendChild(toggle);

            const dot = document.createElement('span');
            dot.className = 'color-dot';
            dot.style.backgroundColor = color;
            header.appendChild(dot);

            const badge = document.createElement('span');
            badge.className = 'tree-badge ' + (node.match ? 'match' : 'fail');
            badge.textContent = node.match ? 'MATCH' : 'FAIL';
            header.appendChild(badge);

            const name = document.createElement('span');
            name.className = 'tree-rule-name';
            name.textContent = node.rule || '(anonymous)';
            header.appendChild(name);

            if (node.data != null) {
                const data = document.createElement('span');
                data.className = 'tree-data';
                data.textContent = JSON.stringify(node.data);
                header.appendChild(data);
            }

            if (node.pos_start != null) {
                const pos = document.createElement('span');
                pos.className = 'tree-pos';
                pos.textContent = node.pos_start + (node.pos_end !== node.pos_start ? '-' + node.pos_end : '');
                header.appendChild(pos);
            }

            container.appendChild(header);

            container.addEventListener('mouseenter', function () {
                highlightStringRegion(node.pos_start, node.pos_end, color);
                highlightEl(this, color);
                var rule = node.rule || '?';
                var posKey = rule + ':' + node.pos_start + '-' + node.pos_end;
                if (matchPosMap) highlightEl(matchPosMap.get(posKey), color);
            });
            container.addEventListener('mouseleave', function () {
                clearStringHighlights();
                clearTraceHighlights();
                clearMatchHighlights();
            });

            if (hasChildren) {
                toggle.addEventListener('click', function () {
                    var expanded = childrenDiv.classList.toggle('open');
                    toggle.textContent = expanded ? '\u25BE' : '\u25B8';
                });

                var childrenDiv = document.createElement('div');
                childrenDiv.className = 'tree-children';
                for (var i = 0; i < node.children.length; i++) {
                    childrenDiv.appendChild(renderTraceNode(node.children[i], depth + 1, id + '/' + i));
                }
                container.appendChild(childrenDiv);

                if (depth < 2) {
                    childrenDiv.classList.add('open');
                    toggle.textContent = '\u25BE';
                }
            }

            return container;
        }

        function clearTrace() {
            document.getElementById('trace-body').innerHTML = '';
        }

        // ============================================================
        // String Highlighting
        // ============================================================
        let highlightEls = [];

        function measureCharWidth() {
            const ta = document.getElementById('string-input');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const style = getComputedStyle(ta);
            ctx.font = style.fontSize + ' ' + style.fontFamily;
            return ctx.measureText('A').width;
        }

        function highlightStringRegion(start, end, color) {
            const container = document.getElementById('string-highlights');
            clearStringHighlights();

            if (start == null || end == null) return;
            const text = document.getElementById('string-input').value;
            const clampedStart = Math.max(0, Math.min(start, text.length));
            const clampedEnd = Math.max(clampedStart, Math.min(end, text.length));
            if (clampedStart >= clampedEnd) return;

            const charWidth = measureCharWidth();
            const fontSize = parseFloat(getComputedStyle(document.getElementById('string-input')).fontSize);
            const lineHeight = fontSize * 1.5;

            const lines = text.split('\n');
            let charCount = 0;
            for (let li = 0; li < lines.length; li++) {
                const line = lines[li];
                const lineStart = charCount;
                const lineEnd = charCount + line.length + 1;
                charCount = lineEnd;

                if (clampedStart < lineEnd && clampedEnd > lineStart) {
                    const hlStart = Math.max(clampedStart - lineStart, 0);
                    const hlEnd = Math.min(clampedEnd - lineStart, line.length);

                    if (hlStart < hlEnd) {
                        const el = document.createElement('div');
                        el.className = 'string-highlight';
                        el.style.top = (li * lineHeight) + 'px';
                        el.style.left = (hlStart * charWidth) + 'px';
                        el.style.width = ((hlEnd - hlStart) * charWidth) + 'px';
                        el.style.height = lineHeight + 'px';
                        el.style.backgroundColor = color;
                        container.appendChild(el);
                        highlightEls.push(el);
                    }
                }
            }
        }

        function getRuleColor(ruleName) {
            if (ruleName === 'TOP') return '#6c7086';

                ruleColors.set(ruleName, STRING_COLOR_PALETTE[ruleColorIndex % STRING_COLOR_PALETTE.length]);

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s != null ? String(s) : '';

        function renderStringColored(match) {
            const output = document.getElementById('string-colored-output');
            const textarea = document.getElementById('string-input');
            if (!output || !textarea) return;

            const text = textarea.value;
            if (!match || !text) {
                output.innerHTML = text ? escapeHtml(text) : '';
                return;
            }

            const nodes = [];
            function collect(node, depth) {
                if (node == null) return;
                if (node.pos_start != null && node.pos_end != null && node.match) {
                    nodes.push({
                        start: node.pos_start,
                        end: node.pos_end,
                        rule: node.rule || 'TOP',
                        depth: depth,
                        isLeaf: !node.children || node.children.length === 0
                    });
                }
                if (node.children) {
                    for (const child of node.children) {
                        collect(child, depth + 1);
                    }
                }
            }
            collect(match, 0);

            if (nodes.length === 0) {
                output.innerHTML = escapeHtml(text);
                return;
            }

            const posRule = new Array(text.length);
            for (let i = 0; i < text.length; i++) {
                let bestDepth = -1;
                let bestNode = null;
                for (const node of nodes) {
                    if (i >= node.start && i < node.end && node.depth > bestDepth) {
                        bestDepth = node.depth;
                        bestNode = node;
                    }
                }
                posRule[i] = bestNode;
            }

            let html = '';
            let i = 0;
            while (i < text.length) {
                const node = posRule[i];
                let j = i + 1;
                while (j < text.length && posRule[j] === node) j++;

                const segment = text.slice(i, j);
                const escaped = escapeHtml(segment);

                if (node) {
                    const color = getRuleColor(node.rule);
                    const style = node.isLeaf ? 'color:' + color + ';font-style:italic' : 'color:' + color;
                    html += '<span style="' + style + '">' + escaped + '</span>';
                } else {
                    html += escaped;
                }

                i = j;
            }

            output.innerHTML = html;
        }

        function clearStringColored() {
            const output = document.getElementById('string-colored-output');
            if (output) output.innerHTML = '';
        }

        function extendStringColoring() {
            const output = document.getElementById('string-colored-output');
            const textarea = document.getElementById('string-input');
            if (!output || !textarea) return;

            const text = textarea.value;
            const outputText = output.textContent;

            if (text === outputText) return;

            if (!text) {
                output.innerHTML = '';
                return;
            }

            const cursorPos = textarea.selectionStart;

            if (text.length > outputText.length) {
                if (cursorPos === text.length && text.startsWith(outputText)) {
                    const lastSpan = output.lastElementChild;
                    if (lastSpan && lastSpan.tagName === 'SPAN') {
                        const style = lastSpan.getAttribute('style') || '';
                        const addedText = text.slice(outputText.length);
                        output.innerHTML += '<span style="' + style + '">' + escapeHtml(addedText) + '</span>';
                        return;
                    }
                }
                return;
            }

            if (text.length < outputText.length && cursorPos === text.length) {
                let remaining = outputText.length - text.length;
                let node = output.lastChild;
                while (node && remaining > 0) {
                    const contentNode = node.nodeType === Node.TEXT_NODE ? node : node.firstChild;
                    if (contentNode && contentNode.nodeType === Node.TEXT_NODE) {
                        const len = contentNode.textContent.length;
                        if (len <= remaining) {
                            remaining -= len;
                            const prev = node.previousSibling;
                            node.remove();
                            node = prev;
                        } else {
                            contentNode.textContent = contentNode.textContent.slice(0, len - remaining);
                            remaining = 0;
                        }
                    } else {
                        node = node.previousSibling;
                    }
                }
            }
        }

        function renderMatchNode(node, path) {
            const id = path + '/' + (node.rule || '?');
            const color = getNodeColor(id);
            const container = document.createElement('div');
            container.className = 'match-node';
            container.dataset.matchPath = id;

            const name = document.createElement('span');

            container.appendChild(name);

            const data = document.createElement('span');
            data.className = 'match-data';
            data.textContent = JSON.stringify(node.data);
            container.appendChild(data);

            matchNodeMap.set(id, container);
            var rule = node.rule || '?';
            if (node.pos_start != null) {
                matchPosMap.set(rule + ':' + node.pos_start + '-' + node.pos_end, container);
            }

            container.addEventListener('mouseenter', function () {
                highlightStringRegion(node.pos_start, node.pos_end, color);
                highlightEl(this, color);
                var posKey = rule + ':' + node.pos_start + '-' + node.pos_end;
                if (tracePosMap) highlightEl(tracePosMap.get(posKey), color);
            });
            container.addEventListener('mouseleave', function () {
                clearStringHighlights();
                clearTraceHighlights();
                clearMatchHighlights();
            });

            if (node.children && node.children.length > 0) {
                var children = document.createElement('div');
                children.className = 'match-children';
                for (var i = 0; i < node.children.length; i++) {
                    children.appendChild(renderMatchNode(node.children[i], id + '/' + i));
                }
                container.appendChild(children);

            return container;

        // ============================================================
        // WebSocket Client
        // ============================================================
        let ws = null;
        let reconnectTimer = null;
        let reconnectDelay = 1000;
        const MAX_RECONNECT = 30000;
        let wsConnected = false;

        function connectWS() {
            const status = document.getElementById('status-bar');
            status.textContent = 'Connecting...';
            status.className = '';

            ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');

            ws.onopen = () => {
                wsConnected = true;
                reconnectDelay = 1000;
                status.textContent = 'Connected';
                status.className = 'connected';
                sendGrammar();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleResponse(data);
                } catch (e) {
                    console.error('WS parse error:', e);
                }
            };

            ws.onclose = () => {
                wsConnected = false;
                status.textContent = 'Reconnecting...';
                status.className = 'reconnecting';
                scheduleReconnect();
            };

            ws.onerror = () => {
                if (!wsConnected) {
                    status.textContent = 'Connection failed';
                    status.className = 'error';
                }
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => {
                connectWS();
                reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT);
            }, reconnectDelay);
        }

        function sendMessage(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
            }
        }

        // ============================================================

        function sendGrammar() {
            const grammar = document.getElementById('grammar-code').value;
            const actions = document.getElementById('actions-code').value;
            const string = document.getElementById('string-input').value;
            currentGrammar = grammar;
            currentString = string;
            var msg = {grammar, string};
            if (actions) msg.actions = actions;
            sendMessage(msg);
        }

        function handleResponse(data) {
            if (data.error) {
                showError(data.error);
                return;
            }
            hideError();
            if (data.trace) renderTrace(data.trace);
            else clearTrace();
            if (data.match) renderMatch(data.match);
            else clearMatch();
            if (data.trace) renderStringColored(data.trace);
            else renderStringColored(null);
            if (data.hasOwnProperty('made')) renderMade(data.made);
            else clearMade();
        }

        function extractGrammarName(code) {
            const m = code.match(/^\s*(?:token|rule|regex|method)\s+(\w+)/m);
            if (m) return m[1];
            const g = code.match(/^\s*grammar\s+(\w+)/m);
            if (g) return g[1];
            return null;
        }

        async function saveFileAs(content, suggestedName, fallbackName) {
            const blob = new Blob([content], {type: 'text/plain'});
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({suggestedName});
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    return;
                } catch (e) {
                    if (e.name === 'AbortError') return;
                }
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fallbackName || suggestedName;
            a.click();
            URL.revokeObjectURL(url);
        }

        function openFileViaInput(inputId) {
            return new Promise(resolve => {
                const input = document.getElementById(inputId);
                input.value = '';
                const handler = function () {
                    input.removeEventListener('change', handler);
                    const file = input.files[0];
                    if (!file) {resolve(null); return;}
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => resolve(null);
                    reader.readAsText(file);
                };
                input.addEventListener('change', handler);
                input.click();
            });
        }

        async function pickAndReadFile(accept, inputId) {
            if ('showOpenFilePicker' in window) {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{description: 'Files', accept: {'text/plain': accept}}],
                        multiple: false
                    });
                    const file = await handle.getFile();
                    return await file.text();
                } catch (e) {
                    if (e.name === 'AbortError') return null;
                }
            }
            return openFileViaInput(inputId);
        }

        function capturePaneState() {
            const vis = {};
            document.querySelectorAll('.panel-toggle input').forEach(function (cb) {
                var toggle = cb.closest('.panel-toggle');
                vis[toggle.dataset.panel] = cb.checked;
            });

            ['grammar', 'string'].forEach(function (id) {
                var el = document.getElementById(id + '-panel');
                if (el) vis[id] = !el.classList.contains('collapsed');
            });

            function getFlex(el) {
                if (!el || el.classList.contains('collapsed') || getComputedStyle(el).display === 'none') return null;
                var flex = el.style.flex;
                if (flex) return parseFloat(flex);
                return null;
            }

            var sizes = {};
            var lh = document.getElementById('left-half');
            var rh = document.getElementById('right-half');
            var lf = getFlex(lh);
            var rf = getFlex(rh);
            if (lf != null && rf != null) sizes.leftRight = lf / (lf + rf);

            var lp = {};
            var gp = document.getElementById('grammar-panel');
            var ap = document.getElementById('actions-panel');
            var sp = document.getElementById('string-panel');
            var gpf = getFlex(gp);
            var apf = getFlex(ap);
            var spf = getFlex(sp);
            var total = 0;
            if (gpf != null) { lp.grammar = gpf; total += gpf; }
            if (apf != null) { lp.actions = apf; total += apf; }
            if (spf != null) { lp.string = spf; total += spf; }
            if (total > 0 && Object.keys(lp).length > 1) {
                for (var k in lp) lp[k] /= total;
            }
            if (Object.keys(lp).length > 0) sizes.leftPanels = lp;

            // Capture collapsed state for grammar and string (header-toggle panels)

            var rp = {};
            var tp = document.getElementById('trace-panel');
            var mp = document.getElementById('match-panel');
            var tpf = getFlex(tp);
            var mpf = getFlex(mp);
            var rtotal = 0;
            if (tpf != null) { rp.trace = tpf; rtotal += tpf; }
            if (mpf != null) { rp.match = mpf; rtotal += mpf; }
            if (rtotal > 0 && Object.keys(rp).length > 1) {
                for (var k in rp) rp[k] /= rtotal;
            }
            if (Object.keys(rp).length > 0) sizes.rightPanels = rp;

            var made = document.getElementById('made-panel');
            var madef = getFlex(made);
            if (madef != null) sizes.made = madef;

            return { panelVisibility: vis, panelSizes: sizes };
        }

        function sortJsonKeys(key, val) {
            if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
                return Object.keys(val).sort().reduce(function (acc, k) { acc[k] = val[k]; return acc; }, {});
            }
            return val;
        }

        async function copyShareUrl() {
            var grammar = grammarInput.value;
            var string = stringInput.value;
            var actions = actionsInput.value;
            var state = JSON.stringify(capturePaneState(), sortJsonKeys);
            var url;

            try {
                var resp = await fetch('/_store', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grammar_code: grammar, string_input: string, actions_code: actions, state: state })
                });
                if (!resp.ok) throw new Error('POST failed: ' + resp.status);
                var data = await resp.json();
                url = window.location.origin + '/' + data.id;
                console.log('share: created snapshot', data.id);
            } catch (e) {
                console.error('share: POST failed', e);
                url = window.location.href;
            }

            // On HTTPS use clipboard API (works without user gesture).
            // On HTTP use prompt() — user gesture is lost after await.
            if (window.isSecureContext && navigator.clipboard) {
                await navigator.clipboard.writeText(url).catch(function () {
                    prompt('Copy this share URL:', url);
                });
            } else {
                prompt('Copy this share URL:', url);
            }
            showCopied();
        }

        async function loadFromPath() {
            var match = window.location.pathname.match(/^\/([0-9a-f]{40})$/i);
            if (!match) { console.warn('loadFromPath: no SHA1 match in path', window.location.pathname); return false; }
            var id = match[1].toLowerCase();
            console.log('loadFromPath: loading snapshot', id);
            try {
                var resp = await fetch('/_store/' + id);
                if (!resp.ok) { console.error('loadFromPath: fetch failed', resp.status, resp.statusText); return false; }
                var data = await resp.json();
                console.log('loadFromPath: loaded snapshot', id);
                grammarInput.value = data.grammar_code || '';
                stringInput.value = data.string_input || '';
                actionsInput.value = data.actions_code || '';
                renderStringColored(null);
                if (data.state) {
                    restorePaneState(JSON.parse(data.state));
                } else {
                    if (data.actions_code) {
                        document.getElementById('actions-panel').classList.remove('collapsed');
                        document.getElementById('made-panel').classList.remove('collapsed');
                        var at = document.querySelector('.panel-toggle[data-panel="actions"] input');
                        var mt = document.querySelector('.panel-toggle[data-panel="made"] input');
                        if (at) at.checked = true;
                        if (mt) mt.checked = true;
                        updateRightHalf();
                    }
                }
                updateHighlight();
                setTimeout(sendGrammar, 500);
                return true;
            } catch (e) {
                console.error('loadFromPath: exception', e);
                return false;
            }
        }

        function restorePaneState(state) {
            if (state.panelVisibility) {
                Object.keys(state.panelVisibility).forEach(function (panel) {
                    var visible = state.panelVisibility[panel];
                    var panelEl = document.getElementById(panel + '-panel');
                    if (panelEl) {
                        panelEl.classList.toggle('collapsed', !visible);
                    }
                    var toggle = document.querySelector('.panel-toggle[data-panel="' + panel + '"] input');
                    if (toggle) toggle.checked = visible;
                });
            }

            if (state.panelSizes) {
                var s = state.panelSizes;
                if (s.leftRight != null) {
                    var lh = document.getElementById('left-half');
                    var rh = document.getElementById('right-half');
                    if (lh) lh.style.flex = s.leftRight.toFixed(4);
                    if (rh) rh.style.flex = (1 - s.leftRight).toFixed(4);
                }
                if (s.leftPanels) {
                    var gp = document.getElementById('grammar-panel');
                    var ap = document.getElementById('actions-panel');
                    var sp = document.getElementById('string-panel');
                    if (s.leftPanels.grammar != null && gp) gp.style.flex = s.leftPanels.grammar.toFixed(4);
                    if (s.leftPanels.actions != null && ap) ap.style.flex = s.leftPanels.actions.toFixed(4);
                    if (s.leftPanels.string != null && sp) sp.style.flex = s.leftPanels.string.toFixed(4);
                }
                if (s.rightPanels) {
                    var tp = document.getElementById('trace-panel');
                    var mp = document.getElementById('match-panel');
                    if (s.rightPanels.trace != null && tp) tp.style.flex = s.rightPanels.trace.toFixed(4);
                    if (s.rightPanels.match != null && mp) mp.style.flex = s.rightPanels.match.toFixed(4);
                }
                if (s.made != null) {
                    var made = document.getElementById('made-panel');
                    if (made) made.style.flex = s.made.toFixed(4);
                }
            }

            updateRightHalf();
            setupResizeHandles();
            setViewMode('pro');
        }

        // ============================================================
        // Event Setup
        // ============================================================
        const grammarInput = document.getElementById('grammar-code');
        const actionsInput = document.getElementById('actions-code');
        const stringInput = document.getElementById('string-input');
        const highlightOutput = document.getElementById('highlight-output');
        const actionsHighlightOutput = document.getElementById('actions-highlight-output');

        async function updateHighlight() {
            const hr = await getHighlightRaku();
            const code = grammarInput.value;
            highlightOutput.innerHTML = await hr(code);
            const actionsCode = actionsInput.value;
            actionsHighlightOutput.innerHTML = await hr(actionsCode);
        }

        grammarInput.addEventListener('input', () => {
            updateHighlight();
            debouncedSend();
        });

        actionsInput.addEventListener('input', () => {
            updateHighlight();
            debouncedSend();
        });

        stringInput.addEventListener('input', () => {
            extendStringColoring();
            debouncedSend();
        });

        grammarInput.addEventListener('scroll', () => {
            const pre = document.getElementById('grammar-highlight');
            pre.scrollTop = grammarInput.scrollTop;
            pre.scrollLeft = grammarInput.scrollLeft;
        });

        actionsInput.addEventListener('scroll', () => {
            const pre = document.getElementById('actions-highlight');
            pre.scrollTop = actionsInput.scrollTop;
            pre.scrollLeft = actionsInput.scrollLeft;
        });

        stringInput.addEventListener('scroll', () => {
            const pre = document.getElementById('string-colored');
            pre.scrollTop = stringInput.scrollTop;
            pre.scrollLeft = stringInput.scrollLeft;
        });

        // Tab handling
        function handleTabKey(e, input, afterEdit) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + '\t' + input.value.substring(end);
                input.selectionStart = input.selectionEnd = start + 1;
                if (afterEdit) afterEdit();
            }
            if ((e.key === 'Enter' && e.ctrlKey) || (e.key === 'Enter' && e.metaKey)) {
                e.preventDefault();
                sendGrammar();
            }
        }

        grammarInput.addEventListener('keydown', (e) => {
            handleTabKey(e, grammarInput, () => { updateHighlight(); debouncedSend(); });
        });

        actionsInput.addEventListener('keydown', (e) => {
            handleTabKey(e, actionsInput, () => { updateHighlight(); debouncedSend(); });
        });

        // Panel toggles
        function updateRightHalf() {
            setupResizeHandles();
            var trace = document.getElementById('trace-panel');
            var match = document.getElementById('match-panel');
            var made = document.getElementById('made-panel');
            var rightHalf = document.getElementById('right-half');
            var rightTopRow = document.getElementById('right-top-row');
            var leftHalf = document.getElementById('left-half');

            var anyVisible = 0;
            if (!trace.classList.contains('collapsed')) anyVisible++;
            if (!match.classList.contains('collapsed')) anyVisible++;
            if (!made.classList.contains('collapsed')) anyVisible++;

            if (anyVisible === 0) {
                rightHalf.classList.add('hidden');
                leftHalf.style.flex = '1';
                return;
            }
            rightHalf.classList.remove('hidden');
            rightHalf.style.flex = '1';
            leftHalf.style.flex = '1';

            var topVisible = 0;
            if (!trace.classList.contains('collapsed')) topVisible++;
            if (!match.classList.contains('collapsed')) topVisible++;

            if (topVisible === 0) {
                rightTopRow.style.display = 'none';
                made.style.flex = '1';
            } else {
                rightTopRow.style.display = '';
                made.style.flex = '';
                if (topVisible === 1) {
                    rightTopRow.classList.add('single');
                } else {
                    rightTopRow.classList.remove('single');
                }
            }
        }

        document.querySelectorAll('.panel-toggle input').forEach(function (cb) {
            cb.addEventListener('change', function () {
                var toggle = this.closest('.panel-toggle');
                var panel = document.getElementById(toggle.dataset.panel + '-panel');
                if (panel) {
                    panel.classList.toggle('collapsed', !this.checked);
                    updateRightHalf();
                }
            });
        });

        function isPanelCollapsed(id) {
            var el = document.getElementById(id + '-panel');
            return !el || el.classList.contains('collapsed');
        }

        function setViewMode(mode) {
            var toggles = document.getElementById('panel-toggles');
            var dsl = document.getElementById('btn-dsl');
            var pro = document.getElementById('btn-pro');
            var panelArea = document.getElementById('panel-area');
            if (!toggles || !dsl || !pro) return;
            var isDsl = (mode === 'dsl');
            toggles.classList.toggle('dsl-mode', isDsl);
            dsl.classList.toggle('active', isDsl);
            pro.classList.toggle('active', !isDsl);
            document.querySelectorAll('.panel-toggle').forEach(function (el) {
                el.style.display = isDsl ? 'none' : '';
            });
        }

        document.getElementById('btn-dsl').addEventListener('click', function () {
            if (this.classList.contains('active')) return;
            resetPanelSizes();
            setPanel('grammar', false);
            setPanel('actions', false);
            setPanel('trace', false);
            setPanel('match', false);
            setPanel('string', true);
            setPanel('made', true);
            updateRightHalf();
            setViewMode('dsl');
        });

        document.getElementById('btn-pro').addEventListener('click', function () {
            if (this.classList.contains('active')) return;
            resetPanelSizes();
            setPanel('grammar', true);
            setPanel('actions', true);
            setPanel('trace', true);
            setPanel('match', true);
            setPanel('string', true);
            setPanel('made', true);
            updateRightHalf();
            setViewMode('pro');
        });

        function resetPanelSizes() {
            ['left-half', 'right-half', 'right-top-row',
             'grammar-panel', 'actions-panel', 'string-panel',
             'trace-panel', 'match-panel', 'made-panel'].forEach(function (id) {
                var el = document.getElementById(id);
                if (el) el.style.flex = '';
            });
        }

        function setPanel(id, visible) {
            var el = document.getElementById(id + '-panel');
            if (!el) return;
            el.classList.toggle('collapsed', !visible);
            var toggle = document.querySelector('.panel-toggle[data-panel="' + id + '"] input');
            if (toggle) toggle.checked = visible;
        }

        // ============================================================
        // Theme Selector
        // ============================================================
        (function initThemeSelect() {
            var sel = document.getElementById('theme-select');
            if (!sel) return;
            Object.keys(PALETTE_REGISTRY).forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            sel.value = activePaletteName;
            sel.addEventListener('change', function () {
                setActivePalette(this.value);
                updateHighlight();
                sendGrammar();
            });
        })();

        // ============================================================
        // Resize Handles
        // ============================================================
        function makeResizeHandle(handleEl, prevEl, nextEl, direction) {
            var startPos, startPrev, startNext;

            function onMouseDown(e) {
                e.preventDefault();
                startPos = direction === 'row' ? e.clientY : e.clientX;
                startPrev = direction === 'row' ? prevEl.offsetHeight : prevEl.offsetWidth;
                startNext = direction === 'row' ? nextEl.offsetHeight : nextEl.offsetWidth;
                handleEl.classList.add('resizing');
                document.body.classList.add('resizing');
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }

            function onMouseMove(e) {
                var pos = direction === 'row' ? e.clientY : e.clientX;
                var delta = pos - startPos;
                var total = startPrev + startNext;
                var prevRatio = (startPrev + delta) / total;
                var nextRatio = (startNext - delta) / total;
                if (prevRatio < 0.1 || nextRatio < 0.1) return;
                if (direction === 'row') {
                    prevEl.style.flex = prevRatio.toFixed(4);
                    nextEl.style.flex = nextRatio.toFixed(4);
                } else {
                    prevEl.style.flex = prevRatio.toFixed(4);
                    nextEl.style.flex = nextRatio.toFixed(4);
                }
            }

            function onMouseUp() {
                handleEl.classList.remove('resizing');
                document.body.classList.remove('resizing');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            handleEl.addEventListener('mousedown', onMouseDown);
        }

        function insertResizeHandle(prev, next, dir) {
            var handle = document.createElement('div');
            handle.className = 'resize-handle dir-' + dir;
            prev.parentNode.insertBefore(handle, next);
            makeResizeHandle(handle, prev, next, dir);
            return handle;
        }

        function setupResizeHandles() {
            var handles = document.querySelectorAll('.resize-handle');
            handles.forEach(function (h) { h.remove(); });

            // Between left-half and right-half
            var leftHalf = document.getElementById('left-half');
            var rightHalf = document.getElementById('right-half');
            if (leftHalf && rightHalf) {
                insertResizeHandle(leftHalf, rightHalf, 'col');
            }

            // Between grammar and actions panels
            var grammarPanel = document.getElementById('grammar-panel');
            var actionsPanel = document.getElementById('actions-panel');
            if (grammarPanel && actionsPanel && !grammarPanel.classList.contains('collapsed') && !actionsPanel.classList.contains('collapsed')) {
                insertResizeHandle(grammarPanel, actionsPanel, 'row');
            }

            // Between actions and string panels
            var stringPanel = document.getElementById('string-panel');
            if (actionsPanel && stringPanel && !actionsPanel.classList.contains('collapsed') && !stringPanel.classList.contains('collapsed')) {
                insertResizeHandle(actionsPanel, stringPanel, 'row');
            }

            // Between trace and match panels
            var tracePanel = document.getElementById('trace-panel');
            var matchPanel = document.getElementById('match-panel');
            if (tracePanel && matchPanel && !tracePanel.classList.contains('collapsed') && !matchPanel.classList.contains('collapsed')) {
                insertResizeHandle(tracePanel, matchPanel, 'col');
            }

            // Between right top row and made panel
            var rightTopRow = document.getElementById('right-top-row');
            var madePanel = document.getElementById('made-panel');
            if (rightTopRow && madePanel && !madePanel.classList.contains('collapsed') && rightTopRow.style.display !== 'none') {
                insertResizeHandle(rightTopRow, madePanel, 'row');
            }
        }

        // Save/Open button handlers
        document.querySelectorAll('[data-action="save-grammar"]').forEach(b => b.addEventListener('click', saveGrammar));
        document.querySelectorAll('[data-action="save-actions"]').forEach(b => b.addEventListener('click', saveActions));
        document.querySelectorAll('[data-action="save-string"]').forEach(b => b.addEventListener('click', saveString));
        document.querySelectorAll('[data-action="open-grammar"]').forEach(b => b.addEventListener('click', openGrammar));
        document.querySelectorAll('[data-action="open-actions"]').forEach(b => b.addEventListener('click', openActions));
        document.querySelectorAll('[data-action="open-string"]').forEach(b => b.addEventListener('click', openString));

        // Share button handler
        document.getElementById('btn-share').addEventListener('click', copyShareUrl);

        // Initial load — check for SHA1 path segment first
        var pathMatch = window.location.pathname.match(/^\/([0-9a-f]{40})$/);
        if (pathMatch) {
            loadFromPath().then(function (ok) {
                if (!ok) {
                    grammarInput.value = GRAMMAR_DEFAULT;
                    stringInput.value = STRING_DEFAULT;
                    updateHighlight();
                    renderStringColored(null);
                    setTimeout(sendGrammar, 500);
                }
            });
        } else {
            grammarInput.value = GRAMMAR_DEFAULT;
            stringInput.value = STRING_DEFAULT;
            updateHighlight();
            renderStringColored(null);
        }

        document.addEventListener('DOMContentLoaded', () => {
            connectWS();
            setupResizeHandles();
            setViewMode('dsl');
            // Initial send after a small delay for WS to connect
            setTimeout(sendGrammar, 500);
        });
    </script>
</body>

</html>
