services:
  grammar-editor:
    build: .
    container_name: grammar-editor
    ports:
      - "3001:3001"
    environment:
      GRAMMAR_WORKER_URL: "http://worker:9000"
      GRAMMAR_SNAPSHOTS_DB: "/data/grammar-snapshots.sqlite3"
    volumes:
      - grammar-snapshots:/data
    depends_on:
      - worker
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: grammar-worker
    expose:
      - "9000"
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "0.5"
    pids_limit: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      GRAMMAR_WORKER_TIMEOUT: "5"
    restart: unless-stopped

volumes:
  grammar-snapshots:
